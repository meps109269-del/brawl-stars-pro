<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> 荒野亂鬥 PRO - V21 無懈可擊版 </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        :root { --primary: #fcd307; --secondary: #e91e63; --panel-bg: rgba(15, 15, 25, 0.95); --text-main: #ffffff; }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; color: var(--text-main); touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top:0; left:0; z-index: 1; }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; z-index: 10; }
        
        #lobby-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: rgba(0,0,0,0.4); pointer-events: auto;}
        .title-box { font-size: 3rem; color: var(--primary); font-weight: bold; text-shadow: 0 4px 10px rgba(0,0,0,0.8); margin-bottom: 30px; }
        .btn { pointer-events: auto; padding: 15px 30px; font-size: 1.2rem; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.1s; margin: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .btn:active { transform: scale(0.95); }
        
        #battle-ui { display: none; width: 100%; height: 100%; position: absolute; top: 0; pointer-events: none; }
        
        /* Joysticks */
        .joystick { position: absolute; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; bottom: 30px; pointer-events: auto; touch-action: none; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        #joy-left { left: 30px; }
        #joy-right { right: 130px; } /* 為大絕按鈕留空間 */
        .joy-knob { width: 40px; height: 40px; background: rgba(255,255,255,0.7); border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.5); pointer-events: none; }

        /* Super Skill Button */
        #btn-super { position: absolute; bottom: 50px; right: 30px; width: 80px; height: 80px; border-radius: 50%; background: #555; pointer-events: auto; opacity: 0.5; border: 3px solid #333; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; color: #fff; text-shadow: 1px 1px 2px #000; transition: all 0.2s;}
        #btn-super.ready { background: var(--primary); opacity: 1; border-color: #fff; box-shadow: 0 0 20px var(--primary); cursor: pointer; color: #000; text-shadow: none;}

        #game-over-overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 20; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto;}
        #result-title { font-size: 4rem; margin-bottom: 20px; }
        .stats { font-size: 1.5rem; margin-bottom: 10px; }
        
        #damage-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; overflow: hidden; }
        .dmg-num { position: absolute; font-weight: 900; font-size: 24px; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; pointer-events: none; animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1.5); } 100% { opacity: 0; transform: translateY(-50px) scale(1); } }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer" id="lobby-ui">
        <div class="title-box">荒野亂鬥 PRO</div>
        <p style="color:#aaa; margin-bottom: 20px;">V21 無懈可擊版 - AI 重構</p>
        <button class="btn" onclick="game.startGame('single')">單人模式 (開始討伐)</button>
    </div>

    <div class="ui-layer" id="battle-ui">
        <div id="joy-left" class="joystick"><div class="joy-knob" id="knob-left"></div></div>
        <div id="joy-right" class="joystick"><div class="joy-knob" id="knob-right"></div></div>
        <div id="btn-super" onclick="game.useSuper()">大絕</div>
    </div>

    <div id="damage-container"></div>

    <div class="ui-layer" id="game-over-overlay">
        <h1 id="result-title">遊戲結束</h1>
        <div class="stats">擊殺分數: <span id="final-score" style="color:var(--primary);">0</span></div>
        <div class="stats">獲得金幣: <span id="earned-gold" style="color:#4caf50;">0</span></div>
        <br>
        <button class="btn" onclick="game.hostReturnToLobby()">返回大廳</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize);
        resize();

        // 存檔系統
        let savedData = { gold: 0 };
        function saveGame() { localStorage.setItem('brawl_save', JSON.stringify(savedData)); }
        try { if(localStorage.getItem('brawl_save')) savedData = JSON.parse(localStorage.getItem('brawl_save')); } catch(e){}

        // 角色設定
        const ROSTER = [
            { name: '神槍手·藍', color: '#2196f3', maxHp: 1500, speed: 6, maxAmmo: 3, reloadSpeed: 50, dmg: 400, fireRate: 15 }
        ];

        // 搖桿全域輸入
        window.Input = { x: 0, y: 0, aim: { active: false, x: 0, y: 0 }, touchR: false, rotateLobby: false };

        const setupJoystick = (zoneId, knobId, isAim) => {
            const zone = document.getElementById(zoneId);
            const knob = document.getElementById(knobId);
            let active = false, baseRect = null;
            
            const handleDown = (e) => {
                e.preventDefault(); active = true; baseRect = zone.getBoundingClientRect();
                if(isAim) { window.Input.touchR = true; window.Input.aim.active = true; }
                update(e);
            };
            const handleMove = (e) => { if(active) update(e); };
            const handleUp = (e) => {
                active = false; knob.style.transform = `translate(0px, 0px)`;
                if(isAim) { window.Input.aim.active = false; window.Input.touchR = false; }
                else { window.Input.x = 0; window.Input.y = 0; }
            };
            const update = (e) => {
                let cx = baseRect.left + baseRect.width/2, cy = baseRect.top + baseRect.height/2;
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                let tx = clientX - cx, ty = clientY - cy;
                let dist = Math.hypot(tx, ty);
                let maxDist = baseRect.width/2 - 20;
                if(dist > maxDist) { tx = (tx/dist)*maxDist; ty = (ty/dist)*maxDist; }
                knob.style.transform = `translate(${tx}px, ${ty}px)`;
                
                let nx = tx/maxDist, ny = ty/maxDist;
                if(isAim) { window.Input.aim.x = nx; window.Input.aim.y = ny; }
                else { window.Input.x = nx; window.Input.y = ny; }
            };
            zone.addEventListener('touchstart', handleDown, {passive:false}); zone.addEventListener('touchmove', handleMove, {passive:false}); zone.addEventListener('touchend', handleUp);
            zone.addEventListener('mousedown', handleDown); document.addEventListener('mousemove', handleMove); document.addEventListener('mouseup', handleUp);
        };

        setupJoystick('joy-left', 'knob-left', false);
        setupJoystick('joy-right', 'knob-right', true);

        // 遊戲主引擎
        class Game {
            constructor() {
                this.state = 0; // 0=大廳, 1=戰鬥, 2=結算
                this.selChar = 0;
                this.lobbyAngle = 0;
                this.scoreBlue = 0;
                this.myId = Math.random().toString(36).substr(2, 9);
                this.isHost = true;
                this.isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
                this.currentLobbyMode = 'single';
                this.otherPlayers = {};
                this.camera = { x: 0, y: 0, zoom: 1 };
                this.mapW = 2400;
                this.mapH = 2400;
                this.obstacles = [];
                this.enemies = [];
                this.bullets = [];
                
                // 生成障礙物
                for(let i=0; i<20; i++) {
                    this.obstacles.push({
                        x: Math.random()*(this.mapW-300)+150, y: Math.random()*(this.mapH-300)+150,
                        w: Math.random()*150+50, h: Math.random()*150+50
                    });
                }
                this.startGameLoop();
            }

            enterLobby(mode) {
                this.state = 0;
                document.getElementById('lobby-ui').style.display = 'flex';
                document.getElementById('battle-ui').style.display = 'none';
            }

            updateLobbyUI() {}

            startGame(mode) {
                this.state = 1;
                this.currentLobbyMode = mode;
                document.getElementById('lobby-ui').style.display = 'none';
                document.getElementById('battle-ui').style.display = 'block';
                document.getElementById('game-over-overlay').style.display = 'none';
                
                let c = ROSTER[this.selChar];
                this.player = {
                    x: this.mapW/2, y: this.mapH/2, radius: 22, 
                    hp: c.maxHp, maxHp: c.maxHp, angle: 0, team: 'blue', data: c,
                    superCharge: 0, ammo: c.maxAmmo, maxAmmo: c.maxAmmo,
                    ammoReloadTimer: 0, ammoReloadMax: c.reloadSpeed, cd: 0
                };
                this.scoreBlue = 0;
                this.enemies = [];
                this.bullets = [];
                if(this.isHost) {
                    for(let i=0; i<6; i++) this.spawnEnemy();
                }
            }

            useSuper() {
                let p = this.player;
                if(p.superCharge >= 100 && p.hp > 0) {
                    p.superCharge = 0;
                    this.fireBullet(p, { speed: 25, dmg: p.data.dmg * 2.5, color: '#fcd307', type: 'super' }, 'super');
                    document.getElementById('btn-super').classList.remove('ready');
                }
            }

            spawnEnemy() {
                this.enemies.push({
                    id: Math.random().toString(36).substr(2, 9),
                    x: Math.random() > 0.5 ? Math.random()*300 : this.mapW - Math.random()*300, 
                    y: Math.random() > 0.5 ? Math.random()*300 : this.mapH - Math.random()*300,
                    hp: 1200, maxHp: 1200, radius: 25, team: 'red', color: '#e91e63',
                    speed: 4 + Math.random(), cd: 0, comboQueue: [], comboTimer: 0,
                    dashTimer: 0, dashAngle: 0, dashSpeed: 0, pauseTimer: 0, moveStyle: 'CircleStrafe',
                    styleTimer: 0, strafeDir: Math.random()>0.5?1:-1, randomAng: 0
                });
            }

            broadcast(data) { /* Mockup for P2P Broadcast */ }
            updateScoreUI() { /* Mockup */ }

            checkObstacleCollision(x, y, r) {
                for(let o of this.obstacles) {
                    if(x+r > o.x && x-r < o.x+o.w && y+r > o.y && y-r < o.y+o.h) return true;
                }
                return false;
            }

            checkObstacleLineOfSight(x1, y1, x2, y2) {
                let steps = 15;
                for(let i=0; i<=steps; i++) {
                    let tx = x1 + (x2-x1)*(i/steps);
                    let ty = y1 + (y2-y1)*(i/steps);
                    for(let o of this.obstacles) {
                        if(tx > o.x && tx < o.x+o.w && ty > o.y && ty < o.y+o.h) return true; // Blocked
                    }
                }
                return false;
            }

            updateBattle() {
                const p = this.player;
                
                // 本地玩家移動與射擊
                if (p.hp > 0) {
                    let dx = window.Input.x * p.data.speed;
                    let dy = window.Input.y * p.data.speed;
                    p.x += dx;
                    if(p.x < p.radius || p.x > this.mapW - p.radius || this.checkObstacleCollision(p.x, p.y, p.radius)) p.x -= dx;
                    p.y += dy;
                    if(p.y < p.radius || p.y > this.mapH - p.radius || this.checkObstacleCollision(p.x, p.y, p.radius)) p.y -= dy;

                    if (window.Input.aim.active) {
                        p.angle = Math.atan2(window.Input.aim.y, window.Input.aim.x);
                        if (p.cd <= 0 && p.ammo > 0) {
                            this.fireBullet(p, { speed: 22, dmg: p.data.dmg, color: '#00e676', type: 'normal' }, 'normal');
                            p.ammo--;
                            p.cd = p.data.fireRate;
                        }
                    }

                    if (p.ammo < p.maxAmmo) {
                        p.ammoReloadTimer++;
                        p.ammoReloadPct = p.ammoReloadTimer / p.ammoReloadMax;
                        if(p.ammoReloadTimer >= p.ammoReloadMax) {
                            p.ammo++;
                            p.ammoReloadTimer = 0;
                        }
                    }
                    if (p.cd > 0) p.cd--;
                } else {
                    this.endGame("你被擊敗了！", "#f44336", false);
                }

                // 子彈邏輯
                for(let i = this.bullets.length - 1; i >= 0; i--) {
                    let b = this.bullets[i];
                    b.x += Math.cos(b.angle) * b.speed;
                    b.y += Math.sin(b.angle) * b.speed;
                    b.life--;

                    if (b.life <= 0 || b.x < 0 || b.x > this.mapW || b.y < 0 || b.y > this.mapH || this.checkObstacleCollision(b.x, b.y, 5)) {
                        this.bullets.splice(i, 1);
                        continue;
                    }

                    if (b.team === 'blue') {
                        this.enemies.forEach(e => {
                            if (e.hp > 0 && Math.hypot(b.x - e.x, b.y - e.y) < e.radius + 10) {
                                e.hp -= b.dmg;
                                this.showDmg(e.x, e.y, b.dmg, '#fff');
                                b.life = 0;
                                if(p.superCharge < 100) p.superCharge = Math.min(100, p.superCharge + 15);
                                
                                // Bug 2 Fix: 客機只通知扣血，絕不自己幫房主宣告怪物死亡，避免幻影與分數閃爍
                                if (!this.isHost && this.currentLobbyMode === 'multi') { this.broadcast({ type: 'damage_ai', aiId: e.id, dmg: b.dmg }); }
                                else if (e.hp <= 0) { this.checkEnemyDeath(e); }
                            }
                        });
                    }
                    else if (b.team === 'red') {
                        if(p.hp > 0 && Math.hypot(b.x-p.x, b.y-p.y) < p.radius + 10) {
                            p.hp -= b.dmg; this.showDmg(p.x, p.y, b.dmg, '#f44336'); b.life = 0;
                        }
                    }
                    // Bug 3 Fix: 隊友的子彈打到怪會有視覺消失效果，不會穿透
                    else if (b.team === 'remote') {
                        this.enemies.forEach(e => { if(e.hp > 0 && Math.hypot(b.x-e.x, b.y-e.y) < e.radius + 10) { b.life = 0; } });
                    }
                }
               
                // AI 索敵與走位邏輯 (來自原始碼)
                if(this.isHost || this.currentLobbyMode !== 'multi') {
                    this.enemies.forEach(e => {
                        let targetX = p.x, targetY = p.y, targetHp = p.hp;
                        let minDistToAnyPlayer = Math.hypot(p.x - e.x, p.y - e.y);
                        if(p.hp <= 0) minDistToAnyPlayer = 99999;
                        Object.values(this.otherPlayers).forEach(op => {
                            if (op.hp > 0 && !op.isDead) {
                                let dist = Math.hypot(op.x - e.x, op.y - e.y);
                                if (dist < minDistToAnyPlayer) { minDistToAnyPlayer = dist; targetX = op.x; targetY = op.y; targetHp = op.hp; }
                            }
                        });

                        if(targetHp <= 0) return;

                        let dist = minDistToAnyPlayer; let angleToPlayer = Math.atan2(targetY-e.y, targetX-e.x); let isBlocked = this.checkObstacleLineOfSight(e.x, e.y, targetX, targetY);
                        let moveAng = angleToPlayer; let currentSpeed = e.speed;
                        if (e.comboQueue.length > 0) { if (e.comboTimer > 0) e.comboTimer--; else { let step = e.comboQueue.shift(); if(step.action === 'shoot') { this.aiFire(e, {x:targetX, y:targetY}, step.offset || 0, step.spd || 12, step.dmgMult || 1, step.clr || '#f44336'); } else if(step.action === 'dash') { e.dashTimer = step.dur; e.dashAngle = angleToPlayer + (step.angOffset || 0); e.dashSpeed = step.spd; } else if(step.action === 'pause') { e.pauseTimer = step.dur; } if(e.comboQueue.length > 0) e.comboTimer = e.comboQueue[0].delay; } }
                        if (e.pauseTimer > 0) { e.pauseTimer--; currentSpeed = 0; } else if (e.dashTimer > 0) { e.dashTimer--; moveAng = e.dashAngle; currentSpeed = e.dashSpeed; }
                        else {
                            if (e.hp / e.maxHp < 0.3) { e.moveStyle = 'FleeCover'; if (isBlocked) { moveAng = angleToPlayer; currentSpeed *= 0.4; } else { let bestCoverDist = 9999; let hideX = e.x, hideY = e.y, foundCover = false; this.obstacles.forEach(o => { let ox = o.x + o.w/2; let oy = o.y + o.h/2; let angleFromPlayerToObs = Math.atan2(oy - targetY, ox - targetX); let hideDist = Math.max(o.w, o.h) / 2 + 50; let hx = ox + Math.cos(angleFromPlayerToObs) * hideDist; let hy = oy + Math.sin(angleFromPlayerToObs) * hideDist; if (Math.hypot(e.x - hx, e.y - hy) < bestCoverDist && Math.hypot(targetX - ox, targetY - oy) > 150) { bestCoverDist = Math.hypot(e.x - hx, e.y - hy); hideX = hx; hideY = hy; foundCover = true; } }); moveAng = foundCover ? Math.atan2(hideY - e.y, hideX - e.x) : angleToPlayer + Math.PI; } }
                            else {
                                e.styleTimer--; if (e.styleTimer <= 0) { e.strafeDir *= -1; e.randomAng = Math.random() * Math.PI * 2; e.styleTimer = 30 + Math.random() * 40; }
                                switch(e.moveStyle) { case 'CircleStrafe': if(dist < 200) moveAng = angleToPlayer + Math.PI; else if(dist > 350) moveAng = angleToPlayer; else moveAng = angleToPlayer + (Math.PI/2) * e.strafeDir; break; case 'ZigZag': moveAng = angleToPlayer + (Math.PI/3) * e.strafeDir; break; case 'Kite': if(dist < 350) { moveAng = angleToPlayer + Math.PI; currentSpeed *= 1.2; } else if(dist > 450) { moveAng = angleToPlayer; } else { moveAng = angleToPlayer + (Math.PI/2) * e.strafeDir; currentSpeed *= 0.5; } break; case 'Erratic': moveAng = e.randomAng; if(dist > 500) moveAng = angleToPlayer; break; case 'Ambush': if (dist < 200 || !isBlocked) { e.moveStyle = 'CircleStrafe'; } break; }
                            }
                        }
                        let edx = Math.cos(moveAng) * currentSpeed; let edy = Math.sin(moveAng) * currentSpeed;
                        e.x += edx; if(e.x < e.radius || e.x > this.mapW - e.radius || this.checkObstacleCollision(e.x, e.y, e.radius)) { e.x -= edx; e.strafeDir *= -1; }
                        e.y += edy; if(e.y < e.radius || e.y > this.mapH - e.radius || this.checkObstacleCollision(e.x, e.y, e.radius)) { e.y -= edy; e.strafeDir *= -1; }

                        if(e.comboQueue.length === 0 && e.cd <= 0 && dist < 500 && !isBlocked) {
                            let comboIdx = Math.floor(Math.random() * 10);
                            switch(comboIdx) { case 0: e.comboQueue.push({ delay: 0, action: 'shoot' }, { delay: 12, action: 'shoot' }, { delay: 12, action: 'shoot' }); e.cd = 90; break; case 1: e.comboQueue.push({ delay: 0, action: 'shoot', offset: -0.25 }, { delay: 0, action: 'shoot', offset: 0 }, { delay: 0, action: 'shoot', offset: 0.25 }); e.cd = 70; break; case 2: e.comboQueue.push({ delay: 0, action: 'dash', dur: 15, spd: 12, angOffset: 0 }, { delay: 18, action: 'shoot', dmgMult: 1.5 }); e.cd = 80; break; case 3: e.comboQueue.push({ delay: 0, action: 'shoot' }, { delay: 5, action: 'dash', dur: 12, spd: 14, angOffset: Math.PI }); e.cd = 80; break; case 4: for(let i=0; i<8; i++) e.comboQueue.push({ delay: 0, action: 'shoot', offset: (Math.PI/4)*i }); e.cd = 120; break; case 5: e.comboQueue.push({ delay: 0, action: 'pause', dur: 30 }, { delay: 35, action: 'shoot', spd: 28, dmgMult: 2.5, clr: '#ffeb3b' }); e.cd = 100; break; case 6: e.comboQueue.push({ delay: 0, action: 'shoot' }, { delay: 15, action: 'shoot' }); e.cd = 60; break; case 7: e.comboQueue.push({ delay: 0, action: 'dash', dur: 10, spd: 10, angOffset: -Math.PI/4 }, { delay: 12, action: 'shoot' }, { delay: 10, action: 'dash', dur: 10, spd: 10, angOffset: Math.PI/4 }, { delay: 12, action: 'shoot' }); e.cd = 100; break; case 8: e.comboQueue.push({ delay: 0, action: 'dash', dur: 10, spd: 12, angOffset: Math.PI }, { delay: 12, action: 'shoot', offset: -0.2 }, { delay: 0, action: 'shoot', offset: 0.2 }); e.cd = 90; break; case 9: e.comboQueue.push({ delay: 0, action: 'dash', dur: 10, spd: 15, angOffset: 0 }, { delay: 15, action: 'dash', dur: 10, spd: 15, angOffset: 0 }, { delay: 12, action: 'shoot', dmgMult: 2, spd: 18 }); e.cd = 110; break; }
                            if(e.comboQueue.length > 0) e.comboTimer = e.comboQueue[0].delay;
                        }
                        if(e.cd > 0) e.cd--;
                    });
                }
               
                // 觀戰鏡頭平滑跟隨
                if (p.hp > 0) {
                    this.camera.x += (p.x - canvas.width/2/this.camera.zoom - this.camera.x) * 0.2; 
                    this.camera.y += (p.y - canvas.height/2/this.camera.zoom - this.camera.y) * 0.2;
                } else {
                    let specTarget = Object.values(this.otherPlayers).find(op => op.hp > 0 && !op.isDead);
                    if (specTarget) {
                        this.camera.x += (specTarget.x - canvas.width/2/this.camera.zoom - this.camera.x) * 0.1;
                        this.camera.y += (specTarget.y - canvas.height/2/this.camera.zoom - this.camera.y) * 0.1;
                    }
                }

                if(p.superCharge >= 100 && p.hp > 0) document.getElementById('btn-super').classList.add('ready'); else document.getElementById('btn-super').classList.remove('ready');
            }

            aiFire(e, target, offsetAng, speed, dmgMult, color) { const aimAng = Math.atan2(target.y-e.y, target.x-e.x) + offsetAng + (Math.random()-0.5)*0.1; const dmg = 250 * dmgMult; this.bullets.push({x: e.x, y: e.y, angle: aimAng, speed: speed, dmg: dmg, life: 80, team: e.team, color: color, ownerId: 'ai'}); this.broadcast({ type: 'shoot', ownerId: 'ai', team: e.team, x: e.x, y: e.y, angle: aimAng, dmg: dmg, speed: speed, color: color }); }
            checkEnemyDeath(e) { this.enemies.splice(this.enemies.indexOf(e), 1); this.scoreBlue += 1; this.updateScoreUI(); setTimeout(() => { if (this.state === 1) this.spawnEnemy(); }, 1500); }
            fireBullet(actor, data, typeStr) { if(data.type === 'super') { for(let i=-1; i<=1; i++) this.bullets.push({x:actor.x, y:actor.y, angle:actor.angle+i*0.2, speed:data.speed, dmg:data.dmg, life:60, team:actor.team, color:data.color, ownerId: this.myId}); } else { this.bullets.push({x:actor.x, y:actor.y, angle:actor.angle, speed:data.speed, dmg:data.dmg, life:60, team:actor.team, color:data.color, ownerId: this.myId}); } this.broadcast({ type: 'shoot', ownerId: this.myId, team: actor.team, x: actor.x, y: actor.y, angle: actor.angle, dmg: data.dmg, speed: data.speed, color: data.color, shootType: typeStr }); }
            spawnRemoteBullet(data) { if(data.shootType === 'super') { for(let i=-1; i<=1; i++) this.bullets.push({x:data.x, y:data.y, angle:data.angle+i*0.2, speed:data.speed||20, dmg:data.dmg, life:60, team:'remote', color:data.color||'#fcd307', ownerId: data.ownerId}); } else { this.bullets.push({x:data.x, y:data.y, angle:data.angle, speed:data.speed||22, dmg:data.dmg, life:60, team:'remote', color: data.color||'#f44336', ownerId: data.ownerId}); } }

            endGame(titleText, color, isVictory, forceScore = null) {
                if (this.state === 2) return;
                this.state = 2; document.getElementById('battle-ui').style.display = 'none'; document.getElementById('game-over-overlay').style.display = 'flex';
                document.getElementById('result-title').innerText = titleText; document.getElementById('result-title').style.color = color;
                if (forceScore !== null) this.scoreBlue = forceScore;
                document.getElementById('final-score').innerText = this.scoreBlue;
                let earned = this.scoreBlue * 15 + (isVictory ? 50 : 10); document.getElementById('earned-gold').innerText = earned; savedData.gold += earned; saveGame();
                if(this.syncInterval) clearInterval(this.syncInterval);

                if (this.isHost && this.currentLobbyMode === 'multi') { this.broadcast({ type: 'game_over', titleText, color, isVictory, score: this.scoreBlue }); }
            }
            hostReturnToLobby() {
                if (this.isHost && this.currentLobbyMode === 'multi') { this.broadcast({ type: 'return_lobby' }); }
                this.state = 0; this.updateLobbyUI(); document.getElementById('game-over-overlay').style.display = 'none'; this.enterLobby(this.currentLobbyMode || 'single');
            }
            showDmg(x, y, val, color='#fff') { const el = document.createElement('div'); el.className = 'dmg-num'; el.innerText = val; el.style.color = color; const screenX = (x - this.camera.x) * this.camera.zoom; const screenY = (y - this.camera.y) * this.camera.zoom; el.style.left = screenX + 'px'; el.style.top = screenY + 'px'; document.getElementById('damage-container').appendChild(el); setTimeout(() => el.remove(), 800); }

            startGameLoop() { const loop = () => { this.draw(); if(this.state === 1) this.updateBattle(); requestAnimationFrame(loop); }; loop(); }
            draw() { if(this.state === 0 || this.state === -1) this.drawLobby(); else if(this.state === 1) this.drawBattle(); }
            
            drawLobby() {
                ctx.clearRect(0, 0, canvas.width, canvas.height); const c = ROSTER[this.selChar];
                const grd = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, 600); grd.addColorStop(0, '#222'); grd.addColorStop(1, '#000'); ctx.fillStyle = grd; ctx.fillRect(0,0,canvas.width,canvas.height);
                const cx = canvas.width/2; const cy = canvas.height/2 - 50; if(window.Input.rotateLobby || this.state === -1) this.lobbyAngle += 0.05; else this.lobbyAngle += 0.02;
                ctx.save(); ctx.translate(cx, cy); ctx.scale(3, 3);
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.ellipse(0, 60, 40, 10, 0, 0, Math.PI*2); ctx.fill();
                const sin = Math.sin(this.lobbyAngle); const cos = Math.cos(this.lobbyAngle);
                ctx.fillStyle = c.color; ctx.fillRect(-20, -20, 40, 60); ctx.fillStyle = 'rgba(0,0,0,0.2)'; if(sin > 0) ctx.fillRect(0, -20, 20, 60);
                ctx.fillStyle = '#ffccbc'; ctx.beginPath(); ctx.arc(0, -30, 25, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#444'; ctx.fillRect(25 * cos - 10, 10 + 10 * sin, 30, 15); ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(-15, 40 + 5*sin, 10, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(15, 40 - 5*sin, 10, 0, Math.PI*2); ctx.fill(); ctx.restore();
            }
            
            drawBattle() {
                const z = this.camera.zoom; ctx.clearRect(0,0,canvas.width,canvas.height); ctx.save(); ctx.scale(z, z); ctx.translate(-this.camera.x, -this.camera.y);
                
                // 地板與網格
                ctx.fillStyle = '#2e3138'; ctx.fillRect(0,0,this.mapW,this.mapH); 
                ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth=2; ctx.beginPath(); 
                for(let i=0; i<=this.mapW; i+=100) { ctx.moveTo(i,0); ctx.lineTo(i,this.mapH); } 
                for(let i=0; i<=this.mapH; i+=100) { ctx.moveTo(0,i); ctx.lineTo(this.mapW,i); } 
                ctx.stroke(); ctx.strokeStyle = '#f44336'; ctx.lineWidth = 10; ctx.strokeRect(0,0,this.mapW,this.mapH);
                
                // 障礙物
                ctx.fillStyle = '#424242'; this.obstacles.forEach(o => { ctx.fillRect(o.x, o.y, o.w, o.h); ctx.fillStyle = '#616161'; ctx.fillRect(o.x, o.y-10, o.w, 10); ctx.fillStyle = '#424242'; });

                // 其他玩家 (連線用)
                Object.values(this.otherPlayers).forEach(op => {
                    if(op.hp <= 0 || op.isDead) return;
                    ctx.save(); ctx.translate(op.x, op.y); ctx.rotate(op.angle); ctx.fillStyle = op.color || '#fff'; ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#333'; ctx.fillRect(10, -5, 25, 10); ctx.restore(); ctx.fillStyle = '#f00'; ctx.fillRect(op.x-25, op.y-35, 50, 6); ctx.fillStyle = '#00bcd4'; ctx.fillRect(op.x-25, op.y-35, 50*Math.max(0, op.hp/op.maxHp), 6); if(op.ammo !== undefined) { const slotW = 15; const gap = 2.5; const startX = op.x - 25; const barY = op.y - 43; for(let i=0; i<op.maxAmmo; i++) { ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(startX + i*(slotW+gap), barY, slotW, 4); if(i < op.ammo) { ctx.fillStyle = '#ff9800'; ctx.fillRect(startX + i*(slotW+gap), barY, slotW, 4); } else if (i === op.ammo && op.ammoReloadPct) { ctx.fillStyle = '#ffb74d'; ctx.fillRect(startX + i*(slotW+gap), barY, slotW * op.ammoReloadPct, 4); } } } ctx.fillStyle = '#4facfe'; ctx.font="bold 12px Arial"; ctx.textAlign="center"; ctx.fillText(op.charName.split('·')[1] || "Player", op.x, op.y-50);
                });
               
                // 敵人
                this.enemies.forEach(e => { if(e.hp <= 0) return; ctx.fillStyle = e.color || '#f44336'; ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(e.x + 10, e.y - 5, 5, 0, Math.PI*2); ctx.fill(); if(e.pauseTimer > 0) { ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(e.x, e.y, e.radius+5+Math.sin(Date.now()/50)*5, 0, Math.PI*2); ctx.stroke(); } if(e.dashTimer > 0) { ctx.fillStyle = 'rgba(244,67,54,0.3)'; ctx.beginPath(); ctx.arc(e.x - Math.cos(e.dashAngle)*20, e.y - Math.sin(e.dashAngle)*20, e.radius, 0, Math.PI*2); ctx.fill(); } ctx.fillStyle = '#f00'; ctx.fillRect(e.x-20, e.y-40, 40, 5); ctx.fillStyle = e.moveStyle === 'FleeCover' && Math.random() > 0.5 ? '#fff' : '#0f0'; ctx.fillRect(e.x-20, e.y-40, 40 * Math.max(0, (e.hp/e.maxHp)), 5); });

                // 本機玩家
                if(this.player) {
                    const p = this.player; ctx.save();
                    if (p.hp <= 0) ctx.globalAlpha = 0.3; // 陣亡變成半透明幽靈
                    ctx.translate(p.x, p.y); ctx.rotate(p.angle);
                    if(p.hp > 0 && (window.Input.aim.active || window.Input.touchR)) { ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth=3; ctx.setLineDash([15, 15]); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(600, 0); ctx.stroke(); ctx.setLineDash([]); }
                    ctx.fillStyle = p.data.color; ctx.beginPath(); ctx.arc(0, 0, p.radius, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#333'; ctx.fillRect(10, -5, 25, 10); if(p.superCharge >= 100) { ctx.strokeStyle = '#fcd307'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(0,0,p.radius+5,0,Math.PI*2); ctx.stroke(); } ctx.restore();
                   
                    if (p.hp > 0) {
                        ctx.fillStyle = '#f00'; ctx.fillRect(p.x-25, p.y-45, 50, 6); ctx.fillStyle = '#00e676'; ctx.fillRect(p.x-25, p.y-45, 50 * Math.max(0, (p.hp/p.maxHp)), 6);
                        const slotW = 15; const gap = 2.5; const startX = p.x - 25; const barY = p.y - 53;
                        for(let i=0; i<p.maxAmmo; i++) { ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(startX + i*(slotW+gap), barY, slotW, 4); if (i < p.ammo) { ctx.fillStyle = '#ff9800'; ctx.fillRect(startX + i*(slotW+gap), barY, slotW, 4); ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 1; ctx.strokeRect(startX + i*(slotW+gap), barY, slotW, 4); } else if (i === p.ammo) { ctx.fillStyle = '#ffb74d'; ctx.fillRect(startX + i*(slotW+gap), barY, slotW * (p.ammoReloadTimer/p.ammoReloadMax), 4); } }
                    }
                    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(p.x-20, p.y-75, 40, 15); ctx.fillStyle = '#fff'; ctx.font="bold 14px Arial"; ctx.textAlign="center"; ctx.fillText(p.hp > 0 ? "You" : "Ghost", p.x, p.y-63);
                }
                
                // 子彈
                this.bullets.forEach(b => { ctx.fillStyle = b.color || (b.team==='blue'?'#00e676':'#ff5252'); ctx.beginPath(); ctx.arc(b.x, b.y, b.speed > 25 ? 12 : 8, 0, Math.PI*2); ctx.fill(); ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 10; ctx.fill(); ctx.shadowBlur = 0; }); ctx.restore();
            }
        }
        
        window.game = new window.Game();
    </script>
